<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style/Index.css" />
  </head>
  <body>
    <!-- Encabezado principal -->
    <h1>Supermercado La Economia</h1>

    <!-- Barra de navegación -->
    <div class="nav">
      <a href="#">Inicio</a>
      <a href="#">Ofertas</a>
      <a href="#">Contacto</a>
    </div>

    <!-- Sección de productos -->
    <h2>Productos</h2>

    <!-- Cada producto con su imagen -->
    <p>
      Arroz
      <img src="./style/img/Arroz.jpeg" alt="Arroz" />
    </p>

    <p>
      Leche
      <img src="./style/img/Leche.jpeg" alt="Leche" />
    </p>

    <p>
      Pan
      <img src="./style/img/Pan.jpeg" alt="Pan" />
    </p>

    <p>
      Huevos
      <img src="./style/img/Huevos.jpeg" alt="Huevos" />
    </p>

    <!-- Tabla de precios -->
    <h2>Precios</h2>
    <table>
      <tr>
        <td>Producto</td>
        <td>Precio</td>
      </tr>
      <tr>
        <td>Arroz</td>
        <td>2.500</td>
      </tr>
      <tr>
        <td>Huevos</td>
        <td>19.000</td>
      </tr>
      <tr>
        <td>Leche</td>
        <td>3.900</td>
      </tr>
      <tr>
        <td>Pan</td>
        <td>20.000</td>
      </tr>
    </table>

    <!-- Formulario de contacto -->
    <h2>Contacto</h2>
    <input type="text" placeholder="Nombre" />
    <input type="email" placeholder="Correo" />
    <button>Enviar</button>
  </body>
</html>
